apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: rag-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: rag-platform
spec:
  podSelector:
    matchLabels:
      app: rag-backend
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: rag-frontend
      ports:
        - port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 443
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 5432
          protocol: TCP
        - port: 6333
          protocol: TCP
  policyTypes:
    - Ingress
    - Egress
