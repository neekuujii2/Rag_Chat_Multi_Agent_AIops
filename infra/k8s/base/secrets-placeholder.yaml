apiVersion: v1
kind: Secret
metadata:
  name: rag-platform-secrets
  namespace: rag-platform
type: Opaque
stringData:
  OPENROUTER_API_KEY: "replace-me"
  POSTGRES_DSN: "postgresql+psycopg://rag:replace-me@postgresql.rag-platform.svc.cluster.local:5432/rag"
  REDIS_URL: "redis://:replace-me@redis-master.rag-platform.svc.cluster.local:6379/0"
  CELERY_BROKER_URL: "redis://:replace-me@redis-master.rag-platform.svc.cluster.local:6379/0"
  CELERY_RESULT_BACKEND: "redis://:replace-me@redis-master.rag-platform.svc.cluster.local:6379/1"
