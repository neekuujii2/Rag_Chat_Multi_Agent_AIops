global:
  environment: production
  imageRegistry: 123456789012.dkr.ecr.ap-south-1.amazonaws.com
  domain: app.rag.example.com

frontend:
  replicaCount: 3
  image:
    repository: rag-frontend
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

backend:
  replicaCount: 3
  image:
    repository: rag-backend
    tag: latest
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  config:
    DEFAULT_PROVIDER: openrouter
    DEFAULT_MODEL: openai/gpt-4o-mini
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability:4317
    QDRANT_URL: http://qdrant.rag-platform.svc.cluster.local:6333

autoscaling:
  backend:
    minReplicas: 3
    maxReplicas: 12
    cpuUtilization: 65
  frontend:
    minReplicas: 2
    maxReplicas: 8
    cpuUtilization: 60

secrets:
  existingSecret: rag-platform-secrets
