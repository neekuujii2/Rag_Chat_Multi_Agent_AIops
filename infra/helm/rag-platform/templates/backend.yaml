apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rag-platform.fullname" . }}-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "rag-platform.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "rag-platform.fullname" . }}-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: rag-backend
      containers:
        - name: backend
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "rag-platform.fullname" . }}-config
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          resources:
{{ toYaml .Values.backend.resources | indent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-platform.fullname" . }}-backend
spec:
  selector:
    app: {{ include "rag-platform.fullname" . }}-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
