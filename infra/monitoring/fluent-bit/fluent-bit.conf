[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    multiline.parser  docker, cri
    Tag               containers.*
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On

[OUTPUT]
    Name   loki
    Match  *
    Host   loki
    Port   3100
    Labels job=fluent-bit,service=$container_name
