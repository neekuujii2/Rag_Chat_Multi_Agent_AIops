user nginx;
worker_processes auto;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format json_combined escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","request_id":"$request_id",'
    '"method":"$request_method","uri":"$request_uri","status":$status,'
    '"request_time":$request_time,"upstream_time":"$upstream_response_time",'
    '"bytes_sent":$bytes_sent,"referer":"$http_referer","user_agent":"$http_user_agent"}';

  access_log /var/log/nginx/access.log json_combined;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  client_max_body_size 50m;
  server_tokens off;
  gzip on;
  gzip_comp_level 5;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
  limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

  upstream frontend_upstream {
    least_conn;
    server frontend:8080 max_fails=3 fail_timeout=15s;
    keepalive 32;
  }

  upstream backend_upstream {
    least_conn;
    server backend:8000 max_fails=3 fail_timeout=15s;
    keepalive 64;
  }

  include /etc/nginx/conf.d/*.conf;
}
