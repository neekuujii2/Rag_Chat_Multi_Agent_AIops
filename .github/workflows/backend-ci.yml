name: backend-ci

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

  pull_request:
    paths:
      - "backend/**"

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:

  # =========================================================
  # Backend Test & Quality Job
  # =========================================================
  backend-test:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements-dev.txt
          pip install -r backend/requirements-prod.txt

      - name: Run Ruff Lint
        run: |
          ruff check backend/app

      - name: Run MyPy
        run: |
          mypy backend/app || true

      - name: Run Pytest
        env:
          PYTHONPATH: backend
        run: |
          pytest backend/tests -v --tb=short

  # =========================================================
  # Security Scanning Job
  # =========================================================
  backend-security:
    name: Security Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      # -----------------------------------------
      # Install Security Tooling Only
      # -----------------------------------------
      - name: Install Security Tools
        run: |
          pip install \
            bandit \
            semgrep \
            safety \
            pip-audit

      # -----------------------------------------
      # Install Project Requirements
      # -----------------------------------------
      - name: Install Backend Dependencies
        run: |
          pip install -r backend/requirements-prod.txt

      # -----------------------------------------
      # Bandit Scan
      # -----------------------------------------
      - name: Run Bandit
        run: |
          bandit -r backend/app \
            -f json \
            -o bandit-report.json || true

      # -----------------------------------------
      # Semgrep Scan
      # -----------------------------------------
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            backend \
            --json \
            --output semgrep-report.json || true

      # -----------------------------------------
      # pip-audit
      # -----------------------------------------
      - name: Run pip-audit
        run: |
          pip-audit -r backend/requirements-prod.txt || true

      # -----------------------------------------
      # Safety Check
      # -----------------------------------------
      - name: Run Safety
        run: |
          safety check \
            -r backend/requirements-prod.txt \
            --json > safety-report.json || true

      # -----------------------------------------
      # Upload Security Reports
      # -----------------------------------------
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-reports
          path: |
            bandit-report.json
            semgrep-report.json
            safety-report.json

  # =========================================================
  # Container Security Job
  # =========================================================
  backend-container-security:
    name: Container Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------------------
      # Build Docker Image
      # -----------------------------------------
      - name: Build Backend Docker Image
        run: |
          docker build \
            -f backend/Dockerfile.prod \
            -t rag-backend:latest \
            ./backend

      # -----------------------------------------
      # Trivy Image Scan
      # -----------------------------------------
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: rag-backend:latest
          format: sarif
          output: trivy-backend.sarif

      # -----------------------------------------
      # Upload SARIF Report
      # -----------------------------------------
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif

      # -----------------------------------------
      # Upload Trivy Artifact
      # -----------------------------------------
      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-report
          path: trivy-backend.sarif
