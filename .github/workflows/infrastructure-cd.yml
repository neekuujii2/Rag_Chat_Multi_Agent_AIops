name: infrastructure-cd

on:
  push:
    branches: ["main"]
    paths:
      - "infra/**"
      - ".github/workflows/infrastructure-cd.yml"
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: terraform init
        working-directory: infra/terraform/environments/production
      - run: terraform validate
        working-directory: infra/terraform/environments/production
      - run: terraform plan -out=tfplan
        working-directory: infra/terraform/environments/production
      - if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        working-directory: infra/terraform/environments/production

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: terraform
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - run: docker build -f backend/Dockerfile.prod -t ${{ vars.BACKEND_ECR_REPO }}:${{ github.sha }} backend
      - run: docker build -f frontend/Dockerfile.prod -t ${{ vars.FRONTEND_ECR_REPO }}:${{ github.sha }} .
      - run: docker push ${{ vars.BACKEND_ECR_REPO }}:${{ github.sha }}
      - run: docker push ${{ vars.FRONTEND_ECR_REPO }}:${{ github.sha }}
      - run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}
      - run: helm upgrade --install rag-platform infra/helm/rag-platform --namespace rag-platform --create-namespace --set backend.image.tag=${{ github.sha }} --set frontend.image.tag=${{ github.sha }}
