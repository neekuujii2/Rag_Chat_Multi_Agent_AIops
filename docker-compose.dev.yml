version: "3.9"

services:
  frontend-dev:
    image: node:22-bookworm-slim
    working_dir: /workspace/frontend
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0"]
    environment:
      VITE_API_BASE_URL: /api
      VITE_DEV_PROXY_TARGET: http://backend-dev:8000
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - frontend-node-modules:/workspace/frontend/node_modules

  backend-dev:
    image: python:3.12-slim-bookworm
    working_dir: /workspace/backend
    command: ["sh", "-c", "pip install -r requirements-dev.txt -r requirements-prod.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    environment:
      APP_ENV: dev
      LOG_LEVEL: DEBUG
      LOG_FORMAT: json
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-ragredis}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-ragredis}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-ragredis}@redis:6379/1
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - backend-pip-cache:/root/.cache/pip
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  frontend-node-modules:
  backend-pip-cache:
